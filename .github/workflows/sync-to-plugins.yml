name: Sync Agent-Skills to Plugins

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  workflow_dispatch: # Manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Check out all three repos ───────────────────────────────

      - name: Checkout agent-skills
        uses: actions/checkout@v4
        with:
          path: agent-skills

      - name: Checkout velt-plugin-cursor
        uses: actions/checkout@v4
        with:
          repository: velt-js/velt-plugin-cursor
          path: velt-plugin-cursor
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Checkout velt-plugin-claude
        uses: actions/checkout@v4
        with:
          repository: velt-js/velt-plugin-claude
          path: velt-plugin-claude
          token: ${{ secrets.CROSS_REPO_PAT }}

      # ── 2. Setup Node.js ───────────────────────────────────────────

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install velt-plugin-cursor dependencies
        run: cd $GITHUB_WORKSPACE/velt-plugin-cursor && npm install --ignore-scripts

      # ── 3. Check for existing sync PRs ─────────────────────────────

      - name: Check for existing sync PRs
        id: check-prs
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
        run: |
          for repo in velt-plugin-cursor velt-plugin-claude; do
            pr_json=$(gh pr list --repo velt-js/$repo --label agent-skills-sync --state open --json number,headRefName --jq '.[0] // empty' 2>/dev/null || echo "")
            if [ -n "$pr_json" ]; then
              branch=$(echo "$pr_json" | jq -r '.headRefName')
              number=$(echo "$pr_json" | jq -r '.number')
              echo "Found existing PR #$number on branch $branch in velt-js/$repo"
              git -C $GITHUB_WORKSPACE/$repo fetch origin "$branch"
              git -C $GITHUB_WORKSPACE/$repo checkout "$branch"
            else
              echo "No existing sync PR in velt-js/$repo — will create new"
            fi
          done

      # ── 4. Configure git ───────────────────────────────────────────

      - name: Configure git identity
        run: |
          for repo in velt-plugin-cursor velt-plugin-claude; do
            git -C $GITHUB_WORKSPACE/$repo config user.name "agent-skills-sync[bot]"
            git -C $GITHUB_WORKSPACE/$repo config user.email "agent-skills-sync[bot]@users.noreply.github.com"
          done

      # ── 5. Run sync ────────────────────────────────────────────────

      - name: Sync agent-skills to both plugins
        run: |
          cd $GITHUB_WORKSPACE/velt-plugin-cursor
          node scripts/sync-agent-skills.mjs $GITHUB_WORKSPACE/agent-skills/skills

      - name: Build and validate Cursor plugin
        run: |
          cd $GITHUB_WORKSPACE/velt-plugin-cursor
          npm run build
          npm run validate

      # ── 6. Commit and PR for velt-plugin-cursor ────────────────────

      - name: Commit and PR for velt-plugin-cursor
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
        run: |
          cd $GITHUB_WORKSPACE/velt-plugin-cursor
          git add skills/ rules/ agents/ docs-sync/baselines/
          if git diff --cached --quiet; then
            echo "No changes in velt-plugin-cursor — skipping"
            exit 0
          fi
          git commit -m "sync: update agent-skills from velt-js/agent-skills [automated]"
          CURRENT_BRANCH=$(git branch --show-current)
          if [ "$CURRENT_BRANCH" != "main" ]; then
            echo "Pushing to existing PR branch: $CURRENT_BRANCH"
            git push
          else
            BRANCH="agent-skills-sync/$(date -u +%Y-%m-%dT%H-%M-%S)"
            git checkout -b "$BRANCH"
            git push -u origin "$BRANCH"
            gh pr create --repo velt-js/velt-plugin-cursor \
              --title "sync: update agent-skills [automated]" \
              --label agent-skills-sync \
              --reviewer yoen-velt \
              --body "## Agent-Skills Sync

          Updated bundled agent-skills from [velt-js/agent-skills](https://github.com/velt-js/agent-skills) main branch.

          This PR was automatically triggered by a push to agent-skills.

          ---
          Generated by agent-skills sync workflow"
          fi

      # ── 7. Commit and PR for velt-plugin-claude ────────────────────

      - name: Commit and PR for velt-plugin-claude
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
        run: |
          cd $GITHUB_WORKSPACE/velt-plugin-claude
          git add skills/
          if git diff --cached --quiet; then
            echo "No changes in velt-plugin-claude — skipping"
            exit 0
          fi
          git commit -m "sync: update agent-skills from velt-js/agent-skills [automated]"
          CURRENT_BRANCH=$(git branch --show-current)
          if [ "$CURRENT_BRANCH" != "main" ]; then
            echo "Pushing to existing PR branch: $CURRENT_BRANCH"
            git push
          else
            BRANCH="agent-skills-sync/$(date -u +%Y-%m-%dT%H-%M-%S)"
            git checkout -b "$BRANCH"
            git push -u origin "$BRANCH"
            gh pr create --repo velt-js/velt-plugin-claude \
              --title "sync: update agent-skills [automated]" \
              --label agent-skills-sync \
              --reviewer yoen-velt \
              --body "## Agent-Skills Sync

          Updated bundled agent-skills from [velt-js/agent-skills](https://github.com/velt-js/agent-skills) main branch.

          This PR was automatically triggered by a push to agent-skills.

          ---
          Generated by agent-skills sync workflow"
          fi
